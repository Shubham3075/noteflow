spring.application.name=NoteFlow

# ─── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000



# ─── JPA ─────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:NoteFlowSuperSecretKey2024VeryLongSecure123456789ABC}
app.jwt.expiration=86400000

# ─── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads/}

# ─── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api

# ─── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200,http://localhost:3000,http://127.0.0.1:5500,http://127.0.0.1:4200}

